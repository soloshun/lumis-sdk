apiVersion: openaria.dev/v1alpha1
kind: Project
metadata:
  name: synthetic_checkout_service
spec:
  environment: demo
  memory:
    provider: sqlite
    path: ../.openaria/incidents.db
  reports:
    provider: markdown
    outputDir: ../.openaria/reports
  rules:
    files: [rules.yml]
  model:
    enabled: false
